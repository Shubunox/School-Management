<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard — EduManage SMS</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand" id="sidebar-brand"></div>
    <nav id="sidebar-nav"></nav>
    <div class="logout-box">
      <a href="#" data-logout style="color:#fca5a5;font-size:13px;">⏻ Logout</a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h2 id="topbar-title">Dashboard</h2>
      <div class="user-chip">
        <span id="user-name"></span>
        <div class="avatar" id="user-avatar"></div>
      </div>
    </div>

    <div class="content">
      <div class="stats-grid" id="stats-grid"></div>

      <div class="two-col">
        <div class="card">
          <div class="card-header"><h3>Recent Notices</h3><a href="notices.html" style="font-size:13px;color:var(--primary);">View all</a></div>
          <div id="recent-notices"></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Fee Collection Overview</h3></div>
          <div id="fee-overview"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h3>Class-wise Strength</h3></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Class</th><th>Sections</th><th>Total Students</th><th>Total Teachers</th></tr></thead>
            <tbody id="class-strength-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/db.js"></script>
<script src="../js/ui.js"></script>
<script>
  requireRole("admin");
  const db = getDB();
  renderShell("admin", "admin-dashboard.html", "Dashboard", db.admin.name);

  // Stats
  const totalStudents = db.students.length;
  const totalTeachers = db.teachers.length;
  const totalClasses = db.classes.reduce((acc, c) => acc + c.sections.length, 0);
  const totalCollected = db.fees.reduce((a, f) => a + f.paid, 0);
  const totalDue = db.fees.reduce((a, f) => a + (f.amount - f.paid), 0);

  $("#stats-grid").innerHTML = `
    <div class="stat-card"><div class="info"><div class="label">Total Students</div><div class="value">${totalStudents}</div></div><div class="icon-box icon-blue">🎓</div></div>
    <div class="stat-card"><div class="info"><div class="label">Total Teachers</div><div class="value">${totalTeachers}</div></div><div class="icon-box icon-purple">👩‍🏫</div></div>
    <div class="stat-card"><div class="info"><div class="label">Classes & Sections</div><div class="value">${totalClasses}</div></div><div class="icon-box icon-orange">🏫</div></div>
    <div class="stat-card"><div class="info"><div class="label">Fees Collected</div><div class="value">₹${totalCollected.toLocaleString("en-IN")}</div></div><div class="icon-box icon-green">💰</div></div>
    <div class="stat-card"><div class="info"><div class="label">Fees Due</div><div class="value">₹${totalDue.toLocaleString("en-IN")}</div></div><div class="icon-box icon-red">⚠️</div></div>
  `;
  animateCounters(".stat-card .value", $("#stats-grid"));

  // Recent notices
  const recent = [...db.notices].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 3);
  $("#recent-notices").innerHTML = recent.length
    ? recent
        .map(
          (n) => `
        <div class="notice-item">
          <div class="nt-title">${n.title}</div>
          <div class="nt-meta">${formatDate(n.date)} · For: ${n.audience}</div>
          <div class="nt-body">${n.body}</div>
        </div>`
        )
        .join("")
    : `<div class="empty-state">No notices yet</div>`;

  // Fee overview
  const paidCount = db.fees.filter((f) => f.status === "Paid").length;
  const partialCount = db.fees.filter((f) => f.status === "Partial").length;
  const unpaidCount = db.fees.filter((f) => f.status === "Unpaid").length;
  const pct = (n) => Math.round((n / db.fees.length) * 100) || 0;
  $("#fee-overview").innerHTML = `
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;"><span>Paid</span><span>${paidCount} records</span></div>
      <div class="progress-bar"><div class="fill" data-target="${pct(paidCount)}%" style="background:#16a34a;"></div></div>
    </div>
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;"><span>Partially Paid</span><span>${partialCount} records</span></div>
      <div class="progress-bar"><div class="fill" data-target="${pct(partialCount)}%" style="background:#d97706;"></div></div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;"><span>Unpaid</span><span>${unpaidCount} records</span></div>
      <div class="progress-bar"><div class="fill" data-target="${pct(unpaidCount)}%" style="background:#dc2626;"></div></div>
    </div>
  `;
  animateProgressBars($("#fee-overview"));

  // Class strength table
  $("#class-strength-body").innerHTML = db.classes
    .map((c) => {
      const studentCount = db.students.filter((s) => s.classId === c.id).length;
      const teacherCount = db.teachers.filter((t) => t.classes.some((cs) => cs.startsWith(c.id))).length;
      return `<tr><td>${c.name}</td><td>${c.sections.join(", ")}</td><td>${studentCount}</td><td>${teacherCount}</td></tr>`;
    })
    .join("");
</script>
</body>
</html>
