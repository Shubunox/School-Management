<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Results / Report Card — EduManage SMS</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand" id="sidebar-brand"></div>
    <nav id="sidebar-nav"></nav>
    <div class="logout-box"><a href="#" data-logout style="color:#fca5a5;font-size:13px;">⏻ Logout</a></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h2 id="topbar-title">Results / Report Card</h2>
      <div class="user-chip"><span id="user-name"></span><div class="avatar" id="user-avatar"></div></div>
    </div>

    <div class="content">
      <div class="card">
        <div class="form-group" style="max-width:280px;margin-bottom:16px;">
          <label>Select Exam</label>
          <select id="exam-select"></select>
        </div>

        <div id="report-card-area"></div>
      </div>
    </div>
  </div>
</div>

<script src="../js/db.js"></script>
<script src="../js/ui.js"></script>
<script>
  requireRole("student");
  const db = getDB();
  const session = getSession();
  const student = getStudentById(db, session.userId);
  renderShell("student", "results.html", "Results / Report Card", student.name + "'s Parent");

  $("#exam-select").innerHTML = db.exams.map((ex) => `<option value="${ex.id}">${ex.name} (${ex.term})</option>`).join("");
  $("#exam-select").addEventListener("change", renderReport);

  function renderReport() {
    const examId = $("#exam-select").value;
    const exam = db.exams.find((e) => e.id === examId);
    const marks = db.marks.filter((m) => m.examId === examId && m.studentId === student.id);

    if (!marks.length) {
      $("#report-card-area").innerHTML = `<div class="empty-state"><div class="ic">📝</div>No marks have been entered for this exam yet.</div>`;
      return;
    }

    const totalObtained = marks.reduce((a, m) => a + m.marksObtained, 0);
    const totalMax = marks.reduce((a, m) => a + m.maxMarks, 0);
    const pct = totalMax ? Math.round((totalObtained / totalMax) * 100) : 0;

    $("#report-card-area").innerHTML = `
      <div style="margin-bottom:18px;">
        <div style="font-size:16px;font-weight:700;">${exam.name} — ${exam.term}</div>
        <div style="color:var(--text-light);font-size:13px;">Exam Date: ${formatDate(exam.date)}</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Subject</th><th>Max Marks</th><th>Marks Obtained</th><th>Percentage</th><th>Grade</th></tr></thead>
          <tbody>
            ${marks
              .map((m) => {
                const p = Math.round((m.marksObtained / m.maxMarks) * 100);
                return `<tr><td>${m.subject}</td><td>${m.maxMarks}</td><td>${m.marksObtained}</td><td>${p}%</td><td><span class="badge badge-blue">${gradeFor(p)}</span></td></tr>`;
              })
              .join("")}
          </tbody>
          <tfoot>
            <tr style="font-weight:700;background:#f8fafc;">
              <td>Total</td><td>${totalMax}</td><td>${totalObtained}</td><td>${pct}%</td><td><span class="badge badge-green">${gradeFor(pct)}</span></td>
            </tr>
          </tfoot>
        </table>
      </div>
    `;
  }

  renderReport();
</script>
</body>
</html>
